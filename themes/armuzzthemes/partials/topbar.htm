      <header class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-sm btn-outline-secondary mobile-sidebar-toggle d-lg-none" onclick="openMobileSidebar()">
            <i class="bi bi-list fs-5"></i>
          </button>
          <span class="topbar-title" data-i18n="{% if this.page.id == 'welcome' %}home{% elseif this.page.id == 'dashboard' %}dashboard{% elseif this.page.id == 'teachers' %}teachers_title{% elseif this.page.id == 'teachers_create' %}add_teacher{% elseif this.page.id == 'teachers_edit' %}edit_teacher{% elseif this.page.id == 'students' %}students_title{% elseif this.page.id == 'students_create' %}add_student{% elseif this.page.id == 'students_edit' %}edit_student{% endif %}">{{ this.page.title }}</span>
        </div>
        <div class="topbar-actions">
          {% if user %}
            <!-- Logged in state -->
            <div class="d-none d-md-flex align-items-center me-2">
              <span class="text-secondary small me-2">Hi, <b class="text-dark">{{ user.name }}</b></span>
            </div>
            <a data-request="onLogout" data-request-data="redirect: '{{ 'welcome'|page }}'" class="btn btn-sm btn-outline-danger" title="Sign Out" style="cursor: pointer;">
              <i class="bi bi-box-arrow-right me-1"></i>
              <span class="d-none d-md-inline">Logout</span>
            </a>
          {% else %}
            <!-- Logged out state -->
            <a href="{{ 'account'|page }}" class="btn btn-sm btn-dark" title="Sign In or Register">
              <i class="bi bi-person-circle me-1"></i>
              <span class="d-none d-md-inline">Sign In / Register</span>
            </a>
          {% endif %}
          <div class="vr mx-2"></div>
          <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('langPicker').classList.add('open')" title="Change Language">
            <i class="bi bi-translate"></i>
          </button>
          <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('tzPicker').classList.add('open')" title="Change Timezone">
            <i class="bi bi-clock"></i>
          </button>
          <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('themePicker').classList.add('open')" title="Change Theme">
            <i class="bi bi-palette"></i>
          </button>
        </div>
      </header>
